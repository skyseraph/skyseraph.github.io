name: Skill Daily Generator

on:
  schedule:
    - cron: '0 3 * * *'   # UTC 03:00 = CST 11:00
  workflow_dispatch:
    inputs:
      date:
        description: '指定日期 YYYY-MM-DD（默认今天）'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/skill-daily/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/skill-daily/requirements.txt

      - name: Generate Skill Daily draft
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          TARGET_DATE: ${{ inputs.date }}
        run: python scripts/skill-daily/main.py
        working-directory: ${{ github.workspace }}

      - name: Create branch and PR
        if: steps.gen.outputs.has_content == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="skill-daily/${{ steps.gen.outputs.date }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "${{ steps.gen.outputs.file_path }}"
          git commit -m "feat: Skill日报 #${{ steps.gen.outputs.issue_num }} · ${{ steps.gen.outputs.headline }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "feat: Skill日报 #${{ steps.gen.outputs.issue_num }} · ${{ steps.gen.outputs.headline }}" \
            --body "$(cat <<'PREOF'
          ## Skill 日报草稿

          - 日期：${{ steps.gen.outputs.date }}
          - 期数：#${{ steps.gen.outputs.issue_num }}
          - 采集来源：GitHub Search API / GitHub Trending / GitHub New Repos

          ## Review 清单

          - [ ] 项目链接可访问
          - [ ] Stars 数据来自实际搜索，非估算
          - [ ] 新榜项目创建日期在24h窗口内
          - [ ] frontmatter 日期/期数正确
          - [ ] 发布前将 draft: true 改为 draft: false

          Merge 后自动触发 Hugo 构建部署。
          PREOF
          )" \
            --base main \
            --head "$BRANCH"
