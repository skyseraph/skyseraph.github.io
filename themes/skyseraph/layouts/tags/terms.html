{{ define "main" }}
<div class="container">

  <div class="page-header">
    <h1>tags</h1>
    <p>共 {{ len .Data.Terms }} 个标签</p>
  </div>

  <div class="tag-cloud">
    {{ range .Data.Terms.ByCount }}
    <a href="{{ .Page.RelPermalink }}" class="tag-cloud-item">
      #{{ .Page.Title }}<span style="color:var(--text-dim);margin-left:4px;">{{ .Count }}</span>
    </a>
    {{ end }}
  </div>

</div>
{{ end }}
