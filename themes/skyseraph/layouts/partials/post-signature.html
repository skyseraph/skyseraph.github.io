<div class="post-signature">
  <div class="post-signature-divider"></div>
  <div class="post-signature-content">
    <div class="post-signature-avatar">
      <img src="{{ .Site.Params.avatar }}" alt="{{ .Site.Params.author }}" />
    </div>
    <div class="post-signature-text">
      <div class="post-signature-name">{{ .Site.Params.author }}</div>
      <div class="post-signature-desc">{{ .Site.Params.description }}</div>
    </div>
  </div>
</div>
