{{ if and .Site.Params.giscus.enabled (not .Params.nocomments) }}
<div class="comments">
  <div class="comments-title">
    <span class="lang-zh">留言</span>
    <span class="lang-en">Comments</span>
  </div>
  <script src="https://giscus.app/client.js"
    data-repo="{{ .Site.Params.giscus.repo }}"
    data-repo-id="{{ .Site.Params.giscus.repoID }}"
    data-category="{{ .Site.Params.giscus.category }}"
    data-category-id="{{ .Site.Params.giscus.categoryID }}"
    data-mapping="{{ .Site.Params.giscus.mapping | default "pathname" }}"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="bottom"
    data-theme="{{ .Site.Params.giscus.theme | default "light" }}"
    data-lang="zh-CN"
    crossorigin="anonymous"
    async>
  </script>
</div>
{{ end }}
