<footer class="footer">
  <div class="footer-inner">
    <span class="footer-copy">
      &copy; {{ .Site.Params.since }}–{{ now.Year }} {{ .Site.Params.author }} &middot;
      <a href="{{ "/posts/index.xml" | relURL }}">RSS</a>
    </span>
    <div class="footer-links">
      {{ with .Site.Params.github }}
      <a href="https://github.com/{{ . }}" target="_blank" rel="noopener">GitHub</a>
      {{ end }}
      {{ with .Site.Params.email }}
      <a href="mailto:{{ . }}">Email</a>
      {{ end }}
      {{ with .Site.Params.wechat }}
      {{ end }}
      <a href="javascript:void(0)" id="wechat-qrcode-trigger">公众号</a>
      <span class="footer-sep">·</span>
      <a href="/links/">友链</a>
    </div>
  </div>
  <div class="footer-stats">
    <span class="footer-stat-item">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      本站访问 <span id="busuanzi_value_site_pv">--</span> 次
    </span>
    <span class="footer-stat-sep">·</span>
    <span class="footer-stat-item">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      访客 <span id="busuanzi_value_site_uv">--</span> 人
    </span>
    <span class="footer-stat-sep">·</span>
    <span class="footer-stat-item" id="busuanzi_container_page_pv">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      本页 <span id="busuanzi_value_page_pv">--</span> 次
    </span>
  </div>
</footer>
<div id="wechat-qrcode-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:var(--bg-card);border-radius:12px;padding:24px;text-align:center;max-width:280px;">
    <div style="font-weight:600;margin-bottom:12px;">欢迎关注公众号</div>
    <img src="/images/qrcode.jpg" alt="公众号二维码" style="width:200px;height:200px;border-radius:8px;">
    <div style="margin-top:10px;font-size:0.8rem;color:var(--text-dim);">扫码或长按识别</div>
    <button id="wechat-qrcode-close" style="margin-top:16px;padding:6px 20px;border:1px solid var(--border);background:none;border-radius:6px;cursor:pointer;">关闭</button>
  </div>
</div>
<script>
document.getElementById('wechat-qrcode-trigger').addEventListener('click',function(){
  document.getElementById('wechat-qrcode-modal').style.display='flex';
});
document.getElementById('wechat-qrcode-close').addEventListener('click',function(){
  document.getElementById('wechat-qrcode-modal').style.display='none';
});
document.getElementById('wechat-qrcode-modal').addEventListener('click',function(e){
  if(e.target===this)this.style.display='none';
});
</script>
<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
