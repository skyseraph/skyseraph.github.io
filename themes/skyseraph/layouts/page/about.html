{{ define "main" }}
<div class="container">
  <div class="about-header">
    <div class="about-avatar">
      {{ if .Site.Params.avatar }}
      <img src="{{ .Site.Params.avatar }}" alt="{{ .Site.Params.author }}">
      {{ else }}
      <div class="hero-avatar-placeholder">S</div>
      {{ end }}
    </div>
    <div>
      <h1 style="font-size:1.6rem; font-weight:700; margin-bottom:8px;">{{ .Site.Params.author }}</h1>
      <p style="color:var(--color-text-muted); font-size:0.95rem;">{{ .Site.Params.description }}</p>
      <div class="hero-links" style="margin-top:12px;">
        {{ with .Site.Params.github }}
        <a href="https://github.com/{{ . }}" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0 1 12 6.8c.85.004 1.71.11 2.51.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85v2.74c0 .27.18.58.69.48A10.01 10.01 0 0 0 22 12c0-5.52-4.48-10-10-10z"/></svg>
          GitHub
        </a>
        {{ end }}
        {{ with .Site.Params.email }}
        <a href="mailto:{{ . }}">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Email
        </a>
        {{ end }}
      </div>
    </div>
  </div>
  <article class="prose">{{ .Content }}</article>
  {{ partial "comments.html" . }}
</div>
{{ end }}
