{{ define "main" }}
<div class="container">

  <div class="page-header">
    <h1>{{ .Title }}</h1>
    <p>
      <span class="lang-zh">{{ len .Pages }} 篇文章</span>
      <span class="lang-en">{{ len .Pages }} posts</span>
    </p>
  </div>

  <ul class="post-list" style="padding: 32px 0;">
    {{ range .Pages }}
    <li class="post-item">
      <a href="{{ .RelPermalink }}" class="post-item-title">{{ .Title }}</a>
      <span class="post-item-date">{{ .Date.Format "2006-01-02" }}</span>
    </li>
    {{ end }}
  </ul>

</div>
{{ end }}
